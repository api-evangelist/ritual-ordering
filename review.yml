actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    Documented as a stub. Ritual publishes no public API (REST or WebSocket), so
    no APIs were modeled and no AsyncAPI document was created. The apis.yml records
    the company, its access model (partner/POS integrations and aggregators, no
    public API), and its distressed operating status, with Website, LinkedIn, and
    the partner POS-integration help center as common properties.
